services:
  - type: web
    name: agent-news-aggregator
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app_render:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TIDB_HOST
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: TIDB_PORT
        value: "4000"
      - key: TIDB_USER
        value: 2UqG4ELucZkHn87.root
      - key: TIDB_DATABASE
        value: test
      - key: TIDB_PASSWORD
        sync: false  # 需要在 Render Dashboard 中手动设置
      - key: TAVILY_API_KEY
        sync: false  # 需要在 Render Dashboard 中手动设置

# 定时抓取任务 - 每天 9:00 和 22:00 (UTC+8)
jobs:
  - type: cron
    name: fetch-news-morning
    runtime: python
    schedule: "0 1 * * *"  # UTC 1:00 = 北京时间 9:00
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python fetch_news.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TIDB_HOST
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: TIDB_PORT
        value: "4000"
      - key: TIDB_USER
        value: 2UqG4ELucZkHn87.root
      - key: TIDB_DATABASE
        value: test
      - key: TIDB_PASSWORD
        sync: false
      - key: TAVILY_API_KEY
        sync: false

  - type: cron
    name: fetch-news-evening
    runtime: python
    schedule: "0 14 * * *"  # UTC 14:00 = 北京时间 22:00
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python fetch_news.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TIDB_HOST
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: TIDB_PORT
        value: "4000"
      - key: TIDB_USER
        value: 2UqG4ELucZkHn87.root
      - key: TIDB_DATABASE
        value: test
      - key: TIDB_PASSWORD
        sync: false
      - key: TAVILY_API_KEY
        sync: false
